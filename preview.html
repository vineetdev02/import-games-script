<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Preview</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="dark-theme">
  <div class="container">
    <h1 id="gameTitle"></h1>
    <div class="game-preview-container">
      <div class="game-iframe-container">
        <iframe id="gameIframe" class="game-iframe" allowfullscreen="true"></iframe>
      </div>
      <div class="game-details">
        <h2>Details</h2>
        <p><strong>Description:</strong> <span id="gameDescription"></span></p>
        <p><strong>Instructions:</strong> <span id="gameInstructions"></span></p>
        <p><strong>Category:</strong> <span id="gameCategory"></span></p>
        <p><strong>Main Category:</strong> <span id="gameMainCategory"></span></p>
        <p><strong>Tags:</strong> <span id="gameTags"></span></p>
        <p><strong>Dimensions:</strong> <span id="gameDimensions"></span></p>
        <p><strong>Provider:</strong> <span id="gameProvider"></span></p>
        <p><strong>Featured:</strong> <span id="gameFeatured"></span></p>
      </div>
    </div>
  </div>
  <script src="preview.js"></script>
</body>
</html>
